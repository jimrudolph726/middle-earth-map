<!DOCTYPE html>
<html lang="en">
<head>
    <title>sidebar-v2 example</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="utf-8">

    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.0.1/dist/leaflet.css" />
    <link rel="stylesheet" href="leaflet-sidebar.css" />

    <style>
        body {
            padding: 0;
            margin: 0;
        }

        html, body, #map {
            height: 100%;
            font: 10pt "Helvetica Neue", Arial, Helvetica, sans-serif;
        }

        .lorem {
            font-style: italic;
            color: #AAA;
        }

        #settlementsSection, #pathsSection, #geographySection {
            display: flex;
            flex-direction: column; /* Stack the labels vertically */
            gap: 8px; /* Optional: Add spacing between items */
            padding-left: 16px; /* Optional: Add padding for indentation */
        }

        #settlementsSection label, #pathsSection label, #geographySection label {
            display: flex;
            align-items: center; /* Align the checkbox and label text */
            cursor: pointer; /* Change the cursor to indicate clickability */
        }

        #settlementsSection input[type="checkbox"],
        #pathsSection input[type="checkbox"],
        #geographySection input[type="checkbox"] {
            margin-right: 8px; /* Add spacing between the checkbox and label text */
        }

        .polygon-label {
            background-color: rgba(255, 255, 255, 3); /* Light background */
            border: 2px solid black; /* Darker border */
            border-radius: 5px; /* Optional: Rounded corners */
            padding: 2px 6px; /* Optional: Add some padding */
            font-size: 16px; /* Adjust text size as needed */
            color: black; /* Text color */
            font-weight: bold; /* Make the text bold */
            text-align: center; /* Center the text */
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5); /* Optional: Add a subtle shadow */
            }
    </style>
</head>
<body>
    <div id="sidebar" class="sidebar collapsed">
        <!-- Nav tabs -->
        <div class="sidebar-tabs">
            <ul role="tablist">
                <li><a href="#geography" role="tab"><i class="material-icons">terrain</i> Geography</a></li>
                <li><a href="#paths" role="tab"><i class="material-icons">hiking</i> Paths</a></li>
                <li><a href="#settlements" role="tab"><i class="material-icons">fort</i> Locations</a></li>
            </ul>

            <ul role="tablist">
                <li><a href="#settings" role="tab"><i class="fa fa-gear"></i></a></li>
            </ul>
        </div>

        <!-- Tab panes -->
        <div class="sidebar-content">
            <div class="sidebar-pane" id="geography">
                <h1 class="sidebar-header">
                    Geography
                    <span class="sidebar-close"><i class="fa fa-caret-left"></i></span>
                </h1>
                <div id="geographySection">
                    <label for="mountain_rangesCheckbox">
                        <input type="checkbox" id="mountain_rangesCheckbox" /> Mountain Ranges
                    </label>
                </div>
            </div>

            <div class="sidebar-pane" id="paths">
                <h1 class="sidebar-header">
                    Paths
                    <span class="sidebar-close"><i class="fa fa-caret-left"></i></span>
                </h1>
                <div id="pathsSection">
                    <label for="datesCheckbox">
                      <input type="checkbox" id="datesCheckbox" /> Dates
                    </label>
                    <label for="samfrodopathCheckbox">
                      <input type="checkbox" id="samfrodopathCheckbox" /> Sam and Frodo
                    </label>
                    <label for="aragornCheckbox">
                      <input type="checkbox" id="aragornCheckbox" /> Aragorn, Gimli, Legolas
                    </label>
                </div>
            </div>

            <div class="sidebar-pane" id="settlements">
                <h1 class="sidebar-header">
                    Settlements
                    <span class="sidebar-close"><i class="fa fa-caret-left"></i></span>
                </h1>
                <div id="settlementsSection">
                    <label for="hobbitsCheckbox">
                      <input type="checkbox" id="hobbitsCheckbox" /> Hobbits
                    </label>
                    <label for="menCheckbox">
                      <input type="checkbox" id="menCheckbox" /> Men
                    </label>
                    <label for="elvesCheckbox">
                      <input type="checkbox" id="elvesCheckbox" /> Elves
                    </label>
                </div>
            </div>

            <div class="sidebar-pane" id="settings">
                <h1 class="sidebar-header">Settings<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
            </div>
        </div>
    </div>

    <div id="map" class="sidebar-map"></div>

    <script src="https://unpkg.com/leaflet@1.0.1/dist/leaflet.js"></script>
    <script src="leaflet-sidebar.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="variables.js"></script>
</body>
</html>
