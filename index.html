<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  
  <!-- Favicon -->
  <link rel="icon" href="https://raw.githubusercontent.com/jimrudolph726/middle-earth-map/main/assets/favicon.ico" type="image/x-icon">
  
  <!-- Leaflet Core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Leaflet Sidebar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.3.1/css/leaflet-sidebar.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.3.1/js/leaflet-sidebar.min.js"></script>
  
  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      display: flex;
      height: 100vh;
      flex-direction: column;
    }
    #map {
      flex-grow: 1;
      position: relative;
      z-index: 1;
    }
    #pathsSection,
    #settlementsSection,
    #geographySection {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      z-index: 1000;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    h2 {
      margin: 0 0 10px;
    }
  </style>
</head>
<body>
  <div id="sidebar" class="leaflet-sidebar collapsed">
    <div class="leaflet-sidebar-tabs">
      <ul role="tablist">
        <li><a href="#paths" role="tab" aria-label="Paths"><i class="fas fa-route"></i></a></li>
        <li><a href="#settlements" role="tab" aria-label="Settlements"><i class="fas fa-home"></i></a></li>
        <li><a href="#geography" role="tab" aria-label="Geography"><i class="fas fa-mountain"></i></a></li>
      </ul>
    </div>
    <div class="leaflet-sidebar-content">
      <div class="leaflet-sidebar-pane" id="paths">
        <h1 class="leaflet-sidebar-header">Paths<span class="leaflet-sidebar-close"></span></h1>
        <label><input type="checkbox" id="datesCheckbox" /> Dates</label>
        <label><input type="checkbox" id="samfrodopathCheckbox" /> Sam and Frodo</label>
        <label><input type="checkbox" id="aragornCheckbox" /> Aragorn, Gimli, Legolas</label>
      </div>
      <div class="leaflet-sidebar-pane" id="settlements">
        <h1 class="leaflet-sidebar-header">Settlements<span class="leaflet-sidebar-close"></span></h1>
        <label><input type="checkbox" id="hobbitsCheckbox" /> Hobbits</label>
        <label><input type="checkbox" id="menCheckbox" /> Men</label>
        <label><input type="checkbox" id="elvesCheckbox" /> Elves</label>
      </div>
      <div class="leaflet-sidebar-pane" id="geography">
        <h1 class="leaflet-sidebar-header">Geography<span class="leaflet-sidebar-close"></span></h1>
        <label><input type="checkbox" id="mountain_rangesCheckbox" /> Mountain Ranges</label>
      </div>
    </div>
  </div>
</body>
</html>
