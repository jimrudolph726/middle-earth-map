<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://raw.githubusercontent.com/jimrudolph726/middle-earth-map/main/assets/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://raw.githubusercontent.com/jimrudolph726/middle-earth-map/main/leaflet-sidebar.css" />
  
  <!-- Leaflet Core -->
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      display: flex;
      height: 100vh;
      flex-direction: column;
    }
    #map {
      flex-grow: 1;
      position: relative;
      z-index: 1;
    }
    #pathsSection,
    #settlementsSection,
    #geographySection {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      z-index: 1000; /* Ensures it stays on top of the map */
    }
    #settlementsSection {
      top: 250px; /* Stacks below #pathsSection */
    }
    #geographySection {
      top: 415px; /* Stacks below #pathsSection */
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    h2 {
      margin: 0 0 10px;
    }

    /* Sidebar tab styles */
    .sidebar-tabs {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #ccc;
    }
    .sidebar-tabs button {
      background-color: #f1f1f1;
      border: none;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      font-size: 16px;
      width: 100%;
    }
    .sidebar-tabs button.active {
      background-color: #ddd;
      font-weight: bold;
    }
    .sidebar-tab-content {
      display: none;
      padding: 10px;
    }
    .sidebar-tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Paths Section -->
  <div id="pathsSection">
    <h2>Paths</h2>
    <label for="datesCheckbox">
      <input type="checkbox" id="datesCheckbox" /> Dates
    </label>
    <label for="samfrodopathCheckbox">
      <input type="checkbox" id="samfrodopathCheckbox" /> Sam and Frodo
    </label>
    <label for="aragornCheckbox">
      <input type="checkbox" id="aragornCheckbox" /> Aragorn, Gimli, Legolas
    </label>
  </div>
  
  <!-- Settlements Section -->
  <div id="settlementsSection">
    <h2>Settlements</h2>
    <label for="hobbitsCheckbox">
      <input type="checkbox" id="hobbitsCheckbox" /> Hobbits
    </label>
    <label for="menCheckbox">
      <input type="checkbox" id="menCheckbox" /> Men
    </label>
    <label for="elvesCheckbox">
      <input type="checkbox" id="elvesCheckbox" /> Elves
    </label>
  </div>

  <!-- Sidebar HTML -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-content">
      <!-- Sidebar Tabs -->
      <div class="sidebar-tabs">
        <button class="active" id="geography-tab">Geography</button>
      </div>

      <!-- Sidebar Tab Content -->
      <div id="geography-tab-content" class="sidebar-tab-content active">
        <h2>Geography</h2>
        <label for="mountain_rangesCheckbox">
          <input type="checkbox" id="mountain_rangesCheckbox" /> Mountain Ranges
        </label>
      </div>
    </div>
  </div>

  <div id="map"></div>
  
  <!-- Custom Script -->
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script src="leaflet-sidebar.js"></script>
  <script type="module" src="script.js"></script>
  <script type="module" src="functions.js"></script>

  <script>
    // Tab functionality
    const tabs = document.querySelectorAll('.sidebar-tabs button');
    const tabContents = document.querySelectorAll('.sidebar-tab-content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // Remove active class from all tabs and contents
        tabs.forEach(tab => tab.classList.remove('active'));
        tabContents.forEach(content => content.classList.remove('active'));

        // Add active class to clicked tab and corresponding content
        tab.classList.add('active');
        const tabContent = document.getElementById(tab.id + '-content');
        tabContent.classList.add('active');
      });
    });
  </script>
</body>
</html>
