<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>
  
  <!-- Paths Section -->
  <div id="pathsSection">
    <h2>Paths</h2>
    <button id="toggleSamFrodoPathButton">Show Sam and Frodo's Path</button>
  </div>

  <!-- Locations Section -->
  <div id="locationsSection">
    <h2>Locations</h2>
    <label for="hobbitsCheckbox">
      <input type="checkbox" id="hobbitsCheckbox" /> Hobbits
    </label>
    <br>
    <button id="toggleMenButton">Show Men</button>
    <button id="toggleElvesButton">Show Elves</button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
