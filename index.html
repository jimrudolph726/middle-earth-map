<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Leaflet Sidebar CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.3.1/css/leaflet-sidebar.min.css">

  <!-- Leaflet Sidebar JS -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.3.1/js/leaflet-sidebar.min.js"></script>

  <link rel="icon" href="https://raw.githubusercontent.com/jimrudolph726/middle-earth-map/main/assets/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin="" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet Core -->
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  
  
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      display: flex;
      height: 100vh;
      flex-direction: column;
    }
    #map {
      flex-grow: 1;
      position: relative;
      z-index: 1;
    }
    #pathsSection,
    #settlementsSection,
    #geographySection {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      z-index: 1000; /* Ensures it stays on top of the map */
    }
    #settlementsSection {
      top: 250px; /* Stacks below #pathsSection */
    }
    #geographySection {
      top: 415px; /* Stacks below #pathsSection */
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    h2 {
      margin: 0 0 10px;
    }
  </style>
</head>
<body>
  <div id="sidebar" class="leaflet-sidebar collapsed">
    <!-- Tabs -->
    <div class="leaflet-sidebar-tabs">
      <ul role="tablist">
        <li><a href="#paths" role="tab"><i class="fas fa-route"></i></a></li>
        <li><a href="#settlements" role="tab"><i class="fas fa-home"></i></a></li>
        <li><a href="#geography" role="tab"><i class="fas fa-mountain"></i></a></li>
      </ul>
    </div>
  
    <!-- Tab Content -->
    <div class="leaflet-sidebar-content">
      <div class="leaflet-sidebar-pane" id="paths">
        <h1 class="leaflet-sidebar-header">Paths<span class="leaflet-sidebar-close"></span></h1>
        <label for="datesCheckbox">
          <input type="checkbox" id="datesCheckbox" /> Dates
        </label>
        <label for="samfrodopathCheckbox">
          <input type="checkbox" id="samfrodopathCheckbox" /> Sam and Frodo
        </label>
        <label for="aragornCheckbox">
          <input type="checkbox" id="aragornCheckbox" /> Aragorn, Gimli, Legolas
        </label>
      </div>
      <div class="leaflet-sidebar-pane" id="settlements">
        <h1 class="leaflet-sidebar-header">Settlements<span class="leaflet-sidebar-close"></span></h1>
        <label for="hobbitsCheckbox">
          <input type="checkbox" id="hobbitsCheckbox" /> Hobbits
        </label>
        <label for="menCheckbox">
          <input type="checkbox" id="menCheckbox" /> Men
        </label>
        <label for="elvesCheckbox">
          <input type="checkbox" id="elvesCheckbox" /> Elves
        </label>
      </div>
      <div class="leaflet-sidebar-pane" id="geography">
        <h1 class="leaflet-sidebar-header">Geography<span class="leaflet-sidebar-close"></span></h1>
        <label for="mountain_rangesCheckbox">
          <input type="checkbox" id="mountain_rangesCheckbox" /> Mountain Ranges
        </label>
      </div>
    </div>
  </div>
  
</body>
</html>
