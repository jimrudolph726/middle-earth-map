<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Middle Earth Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 600px;
            border: 2px solid #ddd;
        }
    </style>
</head>
<body>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script>
        // Initialize the map
        var map = L.map('map').setView([0, 0], 2); // Set initial coordinates and zoom level

        // Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Add the georeferenced map image overlay
        L.imageOverlay('https://raw.githubusercontent.com/jimrudolph726/middle-earth-map/main/middle-earth2.jpg', 
                       [[-60, -150], [60, 150]])  // Adjust bounds based on Middle-Earth's geographic area
            .addTo(map);

        // Load the GeoJSON file from the GitHub repository
        fetch('https://raw.githubusercontent.com/jimrudolph726/middle-earth-map/main/points.geojson')
            .then(response => response.json())
            .then(data => {
                // Add the GeoJSON data to the map
                L.geoJSON(data).addTo(map);
            })
            .catch(error => {
                console.error('Error loading GeoJSON file:', error);
            });
    </script>

</body>
</html>
