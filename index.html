<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet Core -->
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  
  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      display: flex;
      height: 100vh;
      flex-direction: column;
    }
    #map {
      flex-grow: 1;
      position: relative;
      z-index: 1;
    }
    #pathsSection,
    #locationsSection {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      z-index: 1000; /* Ensures it stays on top of the map */
    }
    #locationsSection {
      top: 250px; /* Stacks below #pathsSection */
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    h2 {
      margin: 0 0 10px;
    }
  </style>
</head>
<body>
  <!-- Paths Section -->
  <div id="pathsSection">
    <h2>Paths</h2>
    <label for="datesCheckbox">
      <input type="checkbox" id="datesCheckbox" /> Dates
    </label>
    <label for="samfrodopathCheckbox">
      <input type="checkbox" id="samfrodopathCheckbox" /> Sam and Frodo
    </label>
    <label for="aragornCheckbox">
      <input type="checkbox" id="aragornCheckbox" /> Aragorn, Gimli, Legolas
    </label>
  </div>
  

  <!-- Locations Section -->
  <div id="locationsSection">
    <h2>Locations</h2>
    <label for="hobbitsCheckbox">
      <input type="checkbox" id="hobbitsCheckbox" /> Hobbits
    </label>
    <label for="menCheckbox">
      <input type="checkbox" id="menCheckbox" /> Men
    </label>
    <label for="elvesCheckbox">
      <input type="checkbox" id="elvesCheckbox" /> Elves
    </label>
  </div>

  <div id="map"></div>
  
  <!-- Custom Script -->
  <script type="module" src="script.js"></script>
</body>
</html>
