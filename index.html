<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

</head>
<body>
  <div id="map"></div>
  
  <!-- Paths Section -->
  <div id="pathsSection">
    <h2>Paths</h2>
    <button id="toggleButton">Fellowship Path</button>
  </div>

  <!-- Locations Section -->
  <div id="locationsSection">
    <h2>Locations</h2>
    <button id="toggleHobbitsButton">Show Hobbits</button>
    <button id="toggleMenButton">Show Men</button>
    <button id="toggleElvesButton">Show Elves</button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
