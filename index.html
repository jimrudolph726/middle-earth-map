<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet Core -->
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  
  <!-- Leaflet Plugins -->
  <script src="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/georaster-layer-for-leaflet@2.0.0/dist/georaster-layer-for-leaflet.browser.min.js"></script>
  <script src="https://unpkg.com/geotiff"></script>
  <script src="https://unpkg.com/georaster"></script>
</head>
<body>
  <div id="map"></div>
  
  <!-- Paths Section -->
  <div id="pathsSection">
    <h2>Paths</h2>
    <label for="samfrodopathCheckbox">
      <input type="checkbox" id="samfrodopathCheckbox" /> Sam and Frodo
    </label>
  </div>

  <!-- Locations Section -->
  <div id="locationsSection">
    <h2>Locations</h2>
    <label for="hobbitsCheckbox">
      <input type="checkbox" id="hobbitsCheckbox" /> Hobbits
    </label>
    <label for="menCheckbox">
      <input type="checkbox" id="menCheckbox" /> Men
    </label>
    <label for="elvesCheckbox">
      <input type="checkbox" id="elvesCheckbox" /> Elves
    </label>
  </div>

  <!-- Custom Script -->
  <script type="module" src="script.js"></script>
</body>
</html>
