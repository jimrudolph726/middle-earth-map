<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle-earth Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="map"></div>
  
  <!-- Paths Section -->
  <div id="pathsSection">
    <h2>Paths</h2>
    <label for="samfrodopathCheckbox">
      <input type="checkbox" id="samfrodopathCheckbox" /> Sam and Frodo
    </label>
    <br>
  </div>

  <!-- Locations Section -->
  <div id="locationsSection">
    <h2>Locations</h2>
    <label for="hobbitsCheckbox">
      <input type="checkbox" id="hobbitsCheckbox" /> Hobbits
    </label>
    <br>
    <label for="menCheckbox">
      <input type="checkbox" id="menCheckbox" /> Men
    </label>
    <br>
    <label for="elvesCheckbox">
      <input type="checkbox" id="elvesCheckbox" /> Elves
    </label>
    <br>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-geotiff@1.0.1/dist/leaflet-geotiff.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
